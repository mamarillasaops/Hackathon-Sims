<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DataDrop</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#b0cce4;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      user-select:none;
      overflow:hidden;
    }
    canvas { display:block; box-shadow:0 6px 28px rgba(0,50,100,0.22); }
  </style>
</head>
<body>
<canvas id="gc" width="800" height="500"></canvas>
<script>
'use strict';

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const W = 800, H = 500;

// ── Ball data ─────────────────────────────────────────────────────────────────
const BALLS = [
  {
    name:'Tennis Ball',    color:'#c5e43a', hi:'#eaff72', stroke:'#78a010',
    gravity:0.62, indSpeed:240, relTarget:8,  r:19,
    desc:'EASY · Ball 1 of 3',   balThresh:0.22,
  },
  {
    name:'Bouncy Ball',    color:'#ff55aa', hi:'#ff99dd', stroke:'#cc1066',
    gravity:1.02, indSpeed:330, relTarget:13, r:17,
    desc:'MEDIUM · Ball 2 of 3', balThresh:0.15,
  },
  {
    name:'Ping Pong Ball', color:'#f2f2f2', hi:'#ffffff', stroke:'#ff5533',
    gravity:1.42, indSpeed:430, relTarget:18, r:15,
    desc:'HARD · Ball 3 of 3',   balThresh:0.10,
  },
];

// ── Layout ────────────────────────────────────────────────────────────────────
const PIV  = {x:95,  y:462};          // meterstick pivot
const SLEN = 368;                      // stick pixel length
const SW   = 26;                       // stick width
const BX   = 386;                      // ball / indicator x-centre
const BY0  = 62;                       // ball start y
const BY1  = 382;                      // ball landing y (ball never fully reaches this)
const LAND_ZONE = BY0 + (BY1-BY0)*0.72; // kept for reference
const IND  = {y:404, cx:386, hw:112, sw:24}; // indicator bar
const TBL  = {x:590, y:52,  w:200, rh:39};  // data table

const FALL_DUR        = 2.0;  // seconds of balanced fall for 100% balance score
const MAX_ROUND       = 25;   // absolute ceiling (post-drop)
const READY_THRESHOLD = 5;    // A-presses while balanced needed to initiate drop
const SPACE_OPEN      = 1.8;  // seconds after drop before SPACE becomes valid
const SPACE_CLOSE     = 4.8;  // SPACE_OPEN + 3.0 — window closes here → auto-land

// ── Game state ────────────────────────────────────────────────────────────────
let S    = 'INTRO';  // INTRO | PLAYING | RES | DONE | WIN
let bIdx = 0;
let dpts = [];
let sc   = {b:0, r:0, l:0};

// Physics
let ang=0, avel=0;
// Ball
let by=BY0;
// Round tracking
let roundTime=0;
// Indicator
let ix=IND.cx, idir=1;
// Flags
let landed=false;
let dropInitiated=false;  // true once player mashes A enough while READY
let readyPresses=0;       // A-presses accumulated while balanced, pre-drop
// Visual timers
let aFlash=0, earlyFlash=0, resT=0;
// Particles
let pts=[];

// ── Input ─────────────────────────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e => {
  if (e.code==='Space') e.preventDefault();
  if (K[e.code]) return;
  K[e.code] = true;

  if (e.code==='KeyA' && S==='PLAYING' && !landed) {
    aFlash = 0.18;
    mkAPtcl();
    if (!dropInitiated) {
      // Pre-drop: A presses while balanced charge up the drop
      if (Math.abs(ang) < BALLS[bIdx].balThresh) {
        readyPresses++;
        if (readyPresses >= READY_THRESHOLD) {
          dropInitiated = true;   // ball starts falling!
          roundTime = 0;          // balance-score timer starts now
        }
      }
    } else {
      // Post-drop: count toward release score
      sc.r = (sc.r||0) + 1;
    }
  }

  if (e.code==='Space' || e.code==='Enter') {
    if (S==='PLAYING' && !landed) {
      const inWindow = dropInitiated && roundTime >= SPACE_OPEN && roundTime <= SPACE_CLOSE;
      if (inWindow) doLand();
      else earlyFlash = 0.28;
    } else if (['INTRO','DONE','WIN'].includes(S)) {
      advance();
    }
  }
});
window.addEventListener('keyup', e => { K[e.code]=false; });

// ── Flow ──────────────────────────────────────────────────────────────────────
function advance() {
  if (S==='INTRO')     { bIdx=0; dpts=[]; goPlay(); }
  else if (S==='DONE') { bIdx++; if (bIdx>=BALLS.length) S='WIN'; else { dpts=[]; goPlay(); } }
  else if (S==='WIN')  S='INTRO';
}

function goPlay() {
  S = 'PLAYING';
  ang  = (Math.random()>0.5?1:-1)*(0.10 + Math.random()*0.18);
  avel = 0;
  by   = BY0;
  roundTime = 0;
  ix   = IND.cx + (Math.random()>0.5?1:-1)*(IND.hw*0.2 + Math.random()*IND.hw*0.35);
  idir = Math.random()>0.5 ? 1 : -1;
  landed        = false;
  dropInitiated = false;
  readyPresses  = 0;
  earlyFlash    = 0;
  sc = {b:0, r:0, l:0};  // r used as raw press counter (post-drop) until doLand
}

function doLand() {
  by = BY1;   // snap ball to landing position

  const d = Math.abs(ix - IND.cx);
  const landScore   = Math.max(0, Math.min(100, 100 - (d/IND.hw)*116));
  const balScore    = Math.min(100, Math.max(0, 100*(FALL_DUR/Math.max(FALL_DUR,roundTime))));
  const rawPresses  = sc.r||0;
  const relScore    = Math.min(100, Math.max(0, (rawPresses/BALLS[bIdx].relTarget)*100));

  sc = {b:balScore, r:relScore, l:landScore};
  landed = true;
  mkLandPtcl();
  saveDpt();
}

function saveDpt() {
  const {b,r,l} = sc;
  const ov = (b+r+l)/3;
  const ok = ov>=20 && b>=15 && r>=15 && l>=15;
  dpts.push({b,r,l,ov,ok});
  S='RES'; resT=2.3;
}

// ── Particles ─────────────────────────────────────────────────────────────────
function mkAPtcl() {
  pts.push({
    x:BX+(Math.random()-0.5)*28, y:by+(Math.random()-0.5)*20,
    vx:(Math.random()-0.5)*60, vy:-20-Math.random()*45,
    t:0.38+Math.random()*0.22, mt:0.38+Math.random()*0.22,
    sz:2+Math.random()*3, c:`hsl(${28+Math.random()*38},100%,60%)`,
  });
}
function mkLandPtcl() {
  for (let i=0; i<24; i++) {
    const a=Math.random()*Math.PI*2, sp=30+Math.random()*80;
    pts.push({
      x:BX, y:BY1,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      t:0.5+Math.random()*0.48, mt:0.5+Math.random()*0.48,
      sz:2+Math.random()*4.5, c:`hsl(${58+Math.random()*70},100%,60%)`,
    });
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
let lastTs=0;
function update(dt) {
  aFlash     = Math.max(0, aFlash-dt);
  earlyFlash = Math.max(0, earlyFlash-dt);
  pts = pts.filter(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=105*dt; p.t-=dt; return p.t>0; });

  if (S==='PLAYING') {
    const ball    = BALLS[bIdx];
    const balanced = Math.abs(ang) < ball.balThresh;

    // ── Stick physics (inverted pendulum) — always active ────────────────────
    avel += ang * ball.gravity * 1.80 * dt;           // 1.8× harder topple
    avel += (Math.random()-0.5) * 0.055 * ball.gravity * dt; // more random drift
    if (K['ArrowLeft'])  avel -= 1.85*dt;
    if (K['ArrowRight']) avel += 1.85*dt;
    avel *= Math.exp(-1.9*dt);                        // less damping → less forgiving
    ang  += avel*dt;
    const maxA = Math.PI/2.8;
    if (Math.abs(ang) > maxA) { ang=Math.sign(ang)*maxA; avel*=-0.10; }

    // ── Indicator always moves (gives player time to read it pre-drop) ────────
    ix += idir * ball.indSpeed * dt;
    if (ix > IND.cx+IND.hw) { ix=IND.cx+IND.hw; idir=-1; }
    if (ix < IND.cx-IND.hw) { ix=IND.cx-IND.hw; idir=1;  }

    if (dropInitiated) {
      // ── Post-drop: ball falls only while balanced, timer runs ───────────────
      roundTime += dt;
      if (balanced && !landed) {
        // Progressive slowdown — full speed for top 65%, then decelerates,
        // asymptotically approaching BY1 so it never auto-triggers landing.
        const progress  = (by - BY0) / (BY1 - BY0);          // 0 → 1
        const nomSpeed  = (BY1 - BY0) / FALL_DUR;            // px/s at full speed
        const slowFactor = progress < 0.65
          ? 1.0
          : Math.max(0.04, (1.0 - progress) / 0.35);        // linear 1→0.04 over bottom 35%
        by = Math.min(BY1 - 2, by + nomSpeed * slowFactor * dt);
        // No position-based auto-land; window timeout handles it below
      }
      // Auto-land when SPACE window closes (or absolute ceiling)
      if (!landed && (roundTime > SPACE_CLOSE || roundTime > MAX_ROUND)) doLand();
    }
  }

  else if (S==='RES') {
    resT -= dt;
    if (resT<=0) { if (dpts.length>=10) S='DONE'; else goPlay(); }
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function qColor(v) {
  if (v>=82) return '#1a8c38';
  if (v>=65) return '#72b030';
  if (v>=45) return '#c89820';
  if (v>=25) return '#d86020';
  return '#c82020';
}
function txt(s,x,y,{size=13,col='#333',align='left',bold=false}={}) {
  ctx.fillStyle=col; ctx.font=`${bold?'bold ':''}${size}px "Courier New"`;
  ctx.textAlign=align; ctx.fillText(s,x,y);
}
function bar(x,y,w,h,pct,fill) {
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=fill; ctx.fillRect(x,y,w*Math.max(0,Math.min(1,pct)),h);
}

// ── INTRO ─────────────────────────────────────────────────────────────────────
function drawIntro() {
  ctx.fillStyle='#c0d8ee'; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.shadowColor='#1a5090'; ctx.shadowBlur=18;
  txt('DATADROP', W/2, 128, {size:52, col:'#1a5090', align:'center', bold:true});
  ctx.restore();
  txt('Scientific Data Collection Simulator', W/2, 142, {size:14, col:'#4272a0', align:'center'});

  const ctrls = [['← →','Balance the meterstick'],['A','Mash to release the ball'],['SPACE','Time the landing']];
  ctrls.forEach(([k,d],i) => {
    const cy = 200 + i * 42;
    if (k === '← →') {
      // Two individual arrow key boxes
      ['←','→'].forEach((arrow, ai) => {
        const kx = W/2 - 162 + ai * 36;
        ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.strokeStyle='#5080b0'; ctx.lineWidth=1.5;
        ctx.fillRect(kx, cy-17, 30, 28); ctx.strokeRect(kx, cy-17, 30, 28);
        ctx.font='bold 17px Arial'; ctx.textAlign='center'; ctx.fillStyle='#1a3060';
        ctx.fillText(arrow, kx+15, cy+5);
      });
    } else {
      const kw = k.length > 2 ? 68 : 36;
      ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.strokeStyle='#5080b0'; ctx.lineWidth=1.5;
      ctx.fillRect(W/2-162, cy-17, kw, 28); ctx.strokeRect(W/2-162, cy-17, kw, 28);
      txt(k, W/2-162+kw/2, cy+4, {size:13, col:'#1a3060', align:'center', bold:true});
    }
    txt(d, W/2-78, cy+4, {size:13, col:'#3a6290'});
  });

  txt('The ball only falls while the stick is vertical.', W/2, 348, {size:11, col:'#2a4870', align:'center'});
  txt('Balance ← →  +  mash A  +  tap SPACE at the right moment.', W/2, 364, {size:11, col:'#2a4870', align:'center'});

  if (Date.now()%1100<620) txt('PRESS ENTER OR SPACE TO BEGIN', W/2, 406, {size:14, col:'#1a5090', align:'center', bold:true});
}

// ── DONE ──────────────────────────────────────────────────────────────────────
function drawDone() {
  ctx.fillStyle='#c0d8ee'; ctx.fillRect(0,0,W,H);
  const ball=BALLS[bIdx];
  const vld=dpts.filter(d=>d.ok);
  const avg=vld.length ? vld.reduce((s,d)=>s+d.ov,0)/vld.length : 0;

  ctx.save(); ctx.shadowColor=ball.stroke; ctx.shadowBlur=14;
  txt(`${ball.name} — COMPLETE`, W/2, 138, {size:26, col:ball.stroke, align:'center', bold:true});
  ctx.restore();
  txt(`Valid: ${vld.length}/10   Average: ${avg.toFixed(1)}%`, W/2, 178, {size:15, col:'#1a3858', align:'center'});

  dpts.forEach((dp,i) => {
    const rx=W/2-163+(i%5)*66, ry=i<5?218:284;
    ctx.fillStyle=dp.ok ? qColor(dp.ov) : 'rgba(0,0,0,0.12)';
    ctx.fillRect(rx,ry,60,32);
    ctx.fillStyle=dp.ok?'#fff':'rgba(0,0,0,0.3)';
    ctx.font='bold 11px "Courier New"'; ctx.textAlign='center';
    ctx.fillText(dp.ok?`${Math.round(dp.ov)}%`:'VOID', rx+30, ry+21);
  });

  if (bIdx<BALLS.length-1) txt(`Next: ${BALLS[bIdx+1].name}`, W/2, 360, {size:14, col:'#1a5090', align:'center'});
  if (Date.now()%1100<620) txt('PRESS ENTER OR SPACE TO CONTINUE', W/2, 414, {size:14, col:'#1a5090', align:'center', bold:true});
}

// ── WIN ───────────────────────────────────────────────────────────────────────
function drawWin() {
  ctx.fillStyle='#c0d8ee'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.shadowColor='#d4a000'; ctx.shadowBlur=26;
  txt('DATA COLLECTION COMPLETE!', W/2, 155, {size:28, col:'#d4a000', align:'center', bold:true});
  ctx.restore();
  txt('All experiments concluded.', W/2, 200, {size:15, col:'#1a3858', align:'center'});
  ctx.font='72px Arial'; ctx.textAlign='center'; ctx.fillText('🏆', W/2, 316);
  if (Date.now()%1100<620) txt('PRESS ENTER OR SPACE TO PLAY AGAIN', W/2, 394, {size:14, col:'#1a5090', align:'center', bold:true});
}

// ── GAME (PLAYING + RES) ──────────────────────────────────────────────────────
function drawGame() {
  ctx.fillStyle='#c0d8ee'; ctx.fillRect(0,0,W,H);

  // Subtle panel dividers
  ctx.strokeStyle='rgba(60,120,180,0.2)'; ctx.lineWidth=1;
  [192,580].forEach(x => { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); });

  drawStick();
  drawDropZone();
  drawBall();
  drawReadySign();
  drawIndicator();
  drawStopwatch();
  drawTable();
  drawPtcl();

  // Red flash when SPACE pressed too early
  if (earlyFlash>0) {
    ctx.save();
    ctx.globalAlpha = (earlyFlash/0.28)*0.20;
    ctx.fillStyle='#cc0000';
    ctx.fillRect(193,0,387,H);
    ctx.restore();
  }

  if (S==='RES') drawResOverlay();
}

// ── Meterstick + balance arrows ───────────────────────────────────────────────
function drawStick() {
  const ball     = BALLS[bIdx];
  const balanced = Math.abs(ang) < ball.balThresh;
  // Highlight direction arrow that CORRECTS the current tilt
  // ang>0 → tilting right → press LEFT to fix
  // ang<0 → tilting left  → press RIGHT to fix
  const needLeft  = ang >  0.07;
  const needRight = ang < -0.07;

  // ← arrow on left side of panel
  const arrowY = PIV.y - SLEN*0.50;
  ctx.save();
  ctx.globalAlpha = needLeft ? 1.0 : 0.18;
  if (needLeft) {
    ctx.shadowColor='#4499ff'; ctx.shadowBlur=28;
    // Extra bloom pass
    ctx.fillStyle='rgba(80,160,255,0.35)';
    ctx.font='bold 44px Arial'; ctx.textAlign='center';
    ctx.fillText('◄', PIV.x-50, arrowY+13);
  }
  ctx.fillStyle='#1a3c88';
  ctx.font='bold 30px Arial'; ctx.textAlign='center';
  ctx.fillText('◄', PIV.x-50, arrowY+10);
  ctx.restore();

  // → arrow on right side
  ctx.save();
  ctx.globalAlpha = needRight ? 1.0 : 0.18;
  if (needRight) {
    ctx.shadowColor='#4499ff'; ctx.shadowBlur=28;
    ctx.fillStyle='rgba(80,160,255,0.35)';
    ctx.font='bold 44px Arial'; ctx.textAlign='center';
    ctx.fillText('►', PIV.x+50, arrowY+13);
  }
  ctx.fillStyle='#1a3c88';
  ctx.font='bold 30px Arial'; ctx.textAlign='center';
  ctx.fillText('►', PIV.x+50, arrowY+10);
  ctx.restore();

  // Meterstick body
  ctx.save();
  ctx.translate(PIV.x, PIV.y);
  ctx.rotate(ang);

  const g = ctx.createLinearGradient(-SW/2,0,SW/2,0);
  g.addColorStop(0,   '#ae8e28');
  g.addColorStop(0.30,'#e4c660');
  g.addColorStop(0.65,'#f0d87c');
  g.addColorStop(1,   '#ae8e28');
  ctx.fillStyle=g; ctx.fillRect(-SW/2,-SLEN,SW,SLEN);
  ctx.strokeStyle='#7a6018'; ctx.lineWidth=1.5;
  ctx.strokeRect(-SW/2,-SLEN,SW,SLEN);

  // Tick marks & labels
  for (let i=0; i<=100; i++) {
    const ty  = -(SLEN*i/100);
    const maj = i%10===0, mid = i%5===0 && !maj;
    const len = maj ? 12 : mid ? 7 : 4;
    ctx.fillStyle='#382008';
    ctx.fillRect(SW/2-len, ty-0.8, len, 1.6);
    if (maj) {
      ctx.fillStyle='#2a1406'; ctx.font='7px "Courier New"'; ctx.textAlign='right';
      ctx.fillText(`${100-i}`, -SW/2-3, ty+3.5);
    }
  }
  // Red 50 cm stripe
  ctx.fillStyle='rgba(200,30,30,0.55)';
  ctx.fillRect(-SW/2, -SLEN*0.5-1.2, SW, 2.4);

  ctx.restore();

  // Pivot — green halo bloom when balanced
  if (balanced) {
    ctx.save();
    ctx.shadowColor='#22ee88'; ctx.shadowBlur=32;
    ctx.fillStyle='rgba(30,200,100,0.25)';
    ctx.beginPath(); ctx.arc(PIV.x,PIV.y,22,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = balanced ? '#26a848' : '#3a5070';
  ctx.beginPath(); ctx.arc(PIV.x,PIV.y,8,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle= balanced ? 'rgba(100,255,160,0.7)' : 'rgba(180,220,255,0.45)';
  ctx.lineWidth=1.5; ctx.stroke();

  // Danger glow at large angles
  if (Math.abs(ang)>0.44) {
    const f = (Math.abs(ang)-0.44)/(Math.PI/2.8-0.44);
    ctx.save();
    ctx.globalAlpha = f*0.38 + Math.sin(Date.now()/130)*0.10;
    ctx.fillStyle='#ff2222';
    ctx.beginPath(); ctx.arc(PIV.x,PIV.y,16,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Drop zone decorations ──────────────────────────────────────────────────────
function drawDropZone() {
  ctx.strokeStyle='rgba(60,120,180,0.10)'; ctx.lineWidth=1;
  ctx.setLineDash([2,7]);
  [BX-38, BX+38].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x,BY0-3); ctx.lineTo(x,BY1+6); ctx.stroke();
  });
  ctx.setLineDash([]);
  // Landing line
  ctx.strokeStyle='rgba(40,110,70,0.20)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(BX-52,BY1+7); ctx.lineTo(BX+52,BY1+7); ctx.stroke();
}

// ── Ball ──────────────────────────────────────────────────────────────────────
function drawBall() {
  if (S!=='PLAYING' && S!=='RES') return;
  const ball     = BALLS[bIdx];
  const bx       = BX;
  const bby      = S==='RES' ? BY1 : by;
  const balanced = Math.abs(ang) < ball.balThresh;

  // Dim + pulse when ball is falling but stick isn't balanced (only post-drop)
  let bodyAlpha=1;
  if (dropInitiated && !balanced && S==='PLAYING' && !landed && by>BY0+10)
    bodyAlpha = 0.68 + Math.sin(Date.now()/190)*0.14;

  ctx.save();
  ctx.globalAlpha = bodyAlpha;

  // Drop shadow
  ctx.save();
  ctx.globalAlpha *= 0.12 + (bby-BY0)/(BY1-BY0)*0.22;
  ctx.fillStyle='#002040';
  ctx.beginPath(); ctx.ellipse(BX,BY1+6,ball.r*1.2,ball.r*0.26,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Body gradient
  const g = ctx.createRadialGradient(bx-ball.r*0.28,bby-ball.r*0.28,ball.r*0.07,bx,bby,ball.r);
  g.addColorStop(0,ball.hi); g.addColorStop(0.5,ball.color); g.addColorStop(1,ball.stroke);
  ctx.beginPath(); ctx.arc(bx,bby,ball.r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle=ball.stroke; ctx.lineWidth=1.5; ctx.stroke();

  // Ball-specific detail
  const t = Date.now()/1000;
  if (bIdx===0) {
    // Tennis seam
    ctx.save(); ctx.beginPath(); ctx.arc(bx,bby,ball.r,0,Math.PI*2); ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.36)'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.arc(bx,bby,ball.r*0.66,0.4,2.3); ctx.stroke();
    ctx.beginPath(); ctx.arc(bx,bby,ball.r*0.66,Math.PI+0.4,Math.PI+2.3); ctx.stroke();
    ctx.restore();
  } else if (bIdx===2) {
    // Ping pong stripe
    ctx.save(); ctx.beginPath(); ctx.arc(bx,bby,ball.r,0,Math.PI*2); ctx.clip();
    ctx.strokeStyle='#ff5533'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(bx,bby,ball.r-1,t*0.28,t*0.28+1.5); ctx.stroke();
    ctx.restore();
  } else {
    // Bouncy ball shine
    ctx.fillStyle='rgba(255,255,255,0.20)';
    ctx.beginPath(); ctx.arc(bx-ball.r*0.28,bby-ball.r*0.28,ball.r*0.30,0,Math.PI*2); ctx.fill();
  }

  // Large "A" label — flashes bright yellow on keypress
  const aCol = aFlash>0 ? `rgba(255,255,60,${0.5+aFlash/0.18*0.5})` : 'rgba(0,0,0,0.42)';
  if (aFlash>0) { ctx.save(); ctx.shadowColor='#ffff00'; ctx.shadowBlur=10; }
  ctx.fillStyle=aCol;
  ctx.font=`bold ${Math.round(ball.r*1.20)}px Arial`;
  ctx.textAlign='center';
  ctx.fillText('A', bx, bby + ball.r*0.40);
  if (aFlash>0) ctx.restore();

  // Specular highlight
  ctx.fillStyle='rgba(255,255,255,0.44)';
  ctx.beginPath(); ctx.arc(bx-ball.r*0.26,bby-ball.r*0.29,ball.r*0.20,0,Math.PI*2); ctx.fill();

  ctx.restore();

  // Dashed "locked" ring when ball is falling but stick out of balance (post-drop only)
  if (dropInitiated && !balanced && S==='PLAYING' && !landed && by>BY0+16) {
    ctx.save();
    ctx.globalAlpha = 0.28 + Math.sin(Date.now()/180)*0.14;
    ctx.strokeStyle='#cc3333'; ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(bx,bby,ball.r+6,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

// ── READY sign (pre-drop charging state) ─────────────────────────────────────
function drawReadySign() {
  if (S!=='PLAYING' || dropInitiated || landed) return;
  const ball     = BALLS[bIdx];
  const balanced = Math.abs(ang) < ball.balThresh;

  // Position: centred in the drop lane, just below where the ball rests
  const signX = BX;
  const signY = BY0 + ball.r + 34;   // ~129 px from top
  const pips  = READY_THRESHOLD;
  const filled = readyPresses;

  if (balanced) {
    const pulse = 0.80 + Math.sin(Date.now()/220)*0.20;

    // Outer radial halo — large diffuse green bloom behind the pill
    ctx.save();
    ctx.globalAlpha = pulse * 0.45;
    const halo = ctx.createRadialGradient(signX, signY, 8, signX, signY, 68);
    halo.addColorStop(0, 'rgba(0,255,130,0.55)');
    halo.addColorStop(1, 'rgba(0,255,130,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(signX, signY, 68, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Pill background with intense inner glow
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 38;
    const pw=96, ph=34, pr=12;
    ctx.fillStyle='rgba(8,170,72,0.94)';
    ctx.beginPath(); ctx.roundRect(signX-pw/2, signY-ph/2, pw, ph, pr); ctx.fill();

    // Second glow pass for extra brightness
    ctx.shadowBlur = 60;
    ctx.fillStyle='rgba(0,255,120,0.18)';
    ctx.beginPath(); ctx.roundRect(signX-pw/2, signY-ph/2, pw, ph, pr); ctx.fill();

    // "READY" text
    ctx.shadowBlur = 0;
    ctx.fillStyle='#ffffff';
    ctx.font='bold 17px "Courier New"'; ctx.textAlign='center';
    ctx.fillText('READY', signX, signY+6);
    ctx.restore();

  } else if (filled > 0) {
    // Dim ghost pill when unbalanced — show accumulated progress
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.fillStyle='rgba(10,120,60,0.6)';
    const pw=96,ph=34,pr=12;
    ctx.beginPath(); ctx.roundRect(signX-pw/2, signY-ph/2, pw, ph, pr); ctx.fill();
    ctx.fillStyle='#ccffdd';
    ctx.font='bold 17px "Courier New"'; ctx.textAlign='center';
    ctx.fillText('READY', signX, signY+6);
    ctx.restore();
  }

  // Charge pips — always visible during pre-drop, dim when unbalanced
  const pipR=6, pipGap=18;
  const totalPipW = pips*pipR*2 + (pips-1)*(pipGap-pipR*2);
  const pipStartX = signX - totalPipW/2 + pipR;
  const pipY = signY + 26;

  ctx.save();
  ctx.globalAlpha = balanced ? 1.0 : 0.40;
  for (let i=0; i<pips; i++) {
    const px2 = pipStartX + i*pipGap;
    const done = i < filled;
    ctx.beginPath(); ctx.arc(px2, pipY, pipR, 0, Math.PI*2);
    if (done) {
      ctx.fillStyle='#22dd88';
      if (balanced) { ctx.save(); ctx.shadowColor='#00ff88'; ctx.shadowBlur=8; }
      ctx.fill();
      if (balanced) ctx.restore();
    } else {
      ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fill();
      ctx.strokeStyle='rgba(30,130,70,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }
  ctx.restore();
}

// ── Indicator bar ─────────────────────────────────────────────────────────────
function drawIndicator() {
  if (S!=='PLAYING' && S!=='RES') return;
  const {y,cx,hw,sw} = IND;
  const bh      = 20;
  // Indicator lights up during the SPACE window (1.8 s → 4.8 s post-drop)
  const inZone = dropInitiated && roundTime >= SPACE_OPEN && roundTime <= SPACE_CLOSE;

  ctx.save();
  ctx.globalAlpha = inZone ? 1.0 : 0.44;

  // Track background
  ctx.fillStyle='rgba(20,60,100,0.22)';
  ctx.fillRect(cx-hw-6, y-bh/2-5, (hw+6)*2, bh+10);
  ctx.strokeStyle='rgba(80,150,210,0.28)'; ctx.lineWidth=1;
  ctx.strokeRect(cx-hw-6, y-bh/2-5, (hw+6)*2, bh+10);

  // Colour gradient track
  const swf = sw/(hw*2);
  const grd = ctx.createLinearGradient(cx-hw,0,cx+hw,0);
  grd.addColorStop(0,          'rgba(150,30,30,0.72)');
  grd.addColorStop(0.28,       'rgba(180,120,10,0.72)');
  grd.addColorStop(0.5-swf,    'rgba(20,100,20,0.72)');
  grd.addColorStop(0.5,        'rgba(0,210,90,0.90)');
  grd.addColorStop(0.5+swf,    'rgba(20,100,20,0.72)');
  grd.addColorStop(0.72,       'rgba(180,120,10,0.72)');
  grd.addColorStop(1,          'rgba(150,30,30,0.72)');
  ctx.fillStyle=grd;
  ctx.fillRect(cx-hw, y-bh/2, hw*2, bh);

  // Sweet-spot glow
  if (inZone) { ctx.save(); ctx.shadowColor='#00ee88'; ctx.shadowBlur=12; }
  ctx.fillStyle='rgba(0,215,90,0.92)';
  ctx.fillRect(cx-sw/2, y-bh/2, sw, bh);
  if (inZone) ctx.restore();

  // Tick marks
  for (let i=-4; i<=4; i++) {
    ctx.fillStyle='rgba(255,255,255,0.10)';
    ctx.fillRect(cx+i*(hw/4)-0.5, y-bh/2+2, 1, bh-4);
  }

  // Needle
  const nh = bh+14;
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.fillRect(ix-2.5, y-nh/2, 5, nh);
  ctx.strokeStyle='#cc1010'; ctx.lineWidth=1.5;
  ctx.strokeRect(ix-2.5, y-nh/2, 5, nh);

  // Needle tip triangle
  ctx.fillStyle='#cc1010';
  ctx.beginPath();
  ctx.moveTo(ix-5, y-nh/2-6); ctx.lineTo(ix+5, y-nh/2-6); ctx.lineTo(ix, y-nh/2);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

// ── Stopwatch widget (below indicator bar) ────────────────────────────────────
function drawStopwatch() {
  if (S !== 'PLAYING' && S !== 'RES') return;
  const cx = BX;
  const cy = 456;
  const r  = 18;

  // Continuous mock tick; switches to real elapsed when drop is active
  const t = dropInitiated ? roundTime : (Date.now() / 1000) % 60;

  ctx.save();

  // ── Crown stem + button ───────────────────────────────────────────────────
  ctx.fillStyle = '#1e4070';
  ctx.fillRect(cx - 4, cy - r - 7, 8, 7);             // stem
  ctx.beginPath(); ctx.arc(cx, cy - r - 9, 5, 0, Math.PI * 2); ctx.fill(); // button

  // ── Side winder ──────────────────────────────────────────────────────────
  ctx.fillRect(cx + r - 1, cy - 5, 7, 8);

  // ── Face ─────────────────────────────────────────────────────────────────
  ctx.strokeStyle = '#1a3c70'; ctx.lineWidth = 2.5;
  ctx.fillStyle   = 'rgba(215,232,252,0.20)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // inner bezel ring
  ctx.strokeStyle = 'rgba(80,140,200,0.22)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, r - 4, 0, Math.PI * 2); ctx.stroke();

  // ── Tick marks ───────────────────────────────────────────────────────────
  for (let i = 0; i < 60; i++) {
    const a   = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const maj = i % 5 === 0;
    ctx.strokeStyle = maj ? 'rgba(30,70,130,0.75)' : 'rgba(60,110,180,0.30)';
    ctx.lineWidth   = maj ? 1.4 : 0.7;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (maj ? r - 7 : r - 4),
               cy + Math.sin(a) * (maj ? r - 7 : r - 4));
    ctx.lineTo(cx + Math.cos(a) * (r - 1.5), cy + Math.sin(a) * (r - 1.5));
    ctx.stroke();
  }

  // ── Sweep hand ───────────────────────────────────────────────────────────
  const sa = (t % 60) / 60 * Math.PI * 2 - Math.PI / 2;
  ctx.save();
  if (dropInitiated) { ctx.shadowColor = '#ff4020'; ctx.shadowBlur = 7; }
  ctx.strokeStyle = '#cc2010'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - Math.cos(sa) * 4, cy - Math.sin(sa) * 4);
  ctx.lineTo(cx + Math.cos(sa) * (r - 5), cy + Math.sin(sa) * (r - 5));
  ctx.stroke();
  ctx.restore();

  // ── Centre pivot ─────────────────────────────────────────────────────────
  ctx.fillStyle = '#1a3c70';
  ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(210,30,10,0.85)';
  ctx.beginPath(); ctx.arc(cx, cy, 1.5, 0, Math.PI * 2); ctx.fill();


  ctx.restore();
}

// ── Result overlay (drawn over centre panel) ──────────────────────────────────
function drawResOverlay() {
  const dp = dpts[dpts.length-1];
  ctx.fillStyle = dp.ok ? 'rgba(18,128,48,0.92)' : 'rgba(148,28,28,0.92)';
  ctx.fillRect(193, H/2-70, 387, 140);

  ctx.fillStyle='#ffffff';
  ctx.font='bold 19px "Courier New"'; ctx.textAlign='center';
  ctx.fillText(dp.ok ? 'DATA RECORDED' : 'DATA THROWN OUT', 386, H/2-36);

  if (dp.ok) {
    ctx.font='13px "Courier New"';
    ctx.fillText(`${Math.round(dp.ov)}%  ·  B:${Math.round(dp.b)}  R:${Math.round(dp.r)}  L:${Math.round(dp.l)}`, 386, H/2+2);
    const stars = dp.ov>=82?'★★★':dp.ov>=65?'★★☆':dp.ov>=45?'★☆☆':'☆☆☆';
    ctx.font='24px Arial'; ctx.fillText(stars, 386, H/2+40);
  } else {
    const why=[];
    if (dp.b<15) why.push('Balance');
    if (dp.r<15) why.push('Release');
    if (dp.l<15) why.push('Landing');
    ctx.font='12px "Courier New"';
    ctx.fillText(why.length ? `Too poor: ${why.join(', ')}` : 'Overall too low', 386, H/2+8);
  }
}

// ── Data table ────────────────────────────────────────────────────────────────
function drawTable() {
  const {x,y,w,rh} = TBL;
  const ball = BALLS[bIdx];

  // Panel background
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.fillRect(x-6, y-44, w+12, H-y+40);

  // Header: ball icon + name
  const hbx=x+14, hby=y-23;
  ctx.beginPath(); ctx.arc(hbx,hby,11,0,Math.PI*2);
  const hg=ctx.createRadialGradient(hbx-3,hby-3,1,hbx,hby,11);
  hg.addColorStop(0,ball.hi); hg.addColorStop(1,ball.color);
  ctx.fillStyle=hg; ctx.fill(); ctx.strokeStyle=ball.stroke; ctx.lineWidth=1.2; ctx.stroke();

  txt(ball.name, x+32, y-27, {size:11, col:'#1a3050', bold:true});
  txt(ball.desc, x+32, y-13, {size:8,  col:'#3a6080'});

  ctx.strokeStyle='rgba(60,120,180,0.22)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x-6,y-3); ctx.lineTo(x+w+6,y-3); ctx.stroke();

  // 10 data rows
  for (let i=0; i<10; i++) {
    const ry     = y + i*rh;
    const dp     = dpts[i];
    const isNext = i===dpts.length;

    ctx.fillStyle = dp
      ? (dp.ok ? 'rgba(20,110,40,0.12)' : 'rgba(150,20,20,0.10)')
      : (isNext  ? 'rgba(40,100,200,0.10)' : 'transparent');
    ctx.fillRect(x-6, ry, w+12, rh-1);
    ctx.strokeStyle='rgba(60,120,180,0.12)'; ctx.lineWidth=0.5;
    ctx.strokeRect(x-6, ry, w+12, rh-1);

    txt(`#${(i+1).toString().padStart(2,'0')}`, x+2, ry+15, {size:9, col:'rgba(20,70,120,0.45)', bold:true});

    if (dp) {
      if (!dp.ok) {
        ctx.strokeStyle='rgba(150,20,20,0.25)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(x-4,ry+rh/2); ctx.lineTo(x+w+4,ry+rh/2); ctx.stroke();
        txt('VOID', x+w/2+8, ry+rh/2+4, {size:10, col:'rgba(150,20,20,0.45)', align:'center', bold:true});
      } else {
        // B / R / L mini bars
        const bw = 36;
        [['B',dp.b],['R',dp.r],['L',dp.l]].forEach(([lbl,v],j) => {
          const bx2 = x+22+j*(bw+5);
          bar(bx2, ry+4, bw, 8, v/100, qColor(v));
          txt(lbl, bx2+bw/2, ry+24, {size:7, col:'rgba(20,70,120,0.40)', align:'center'});
        });
        // Overall score
        ctx.fillStyle=qColor(dp.ov); ctx.font='bold 13px "Courier New"'; ctx.textAlign='right';
        ctx.fillText(`${Math.round(dp.ov)}`, x+w+4, ry+15);
        // Stars
        const stars=dp.ov>=82?'★★★':dp.ov>=65?'★★☆':dp.ov>=45?'★☆☆':'☆☆☆';
        ctx.fillStyle=dp.ov>=65?'#c09020':'rgba(80,100,120,0.35)';
        ctx.font='10px Arial'; ctx.textAlign='right';
        ctx.fillText(stars, x+w+4, ry+29);
      }
    } else if (isNext) {
      ctx.fillStyle='rgba(40,100,200,0.22)';
      ctx.font='9px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('▶', x+w/2, ry+rh/2+3);
    }
  }

  // Footer count
  const fy = y + 10*rh + 4;
  const vc = dpts.filter(d=>d.ok).length;
  txt(`${vc}/${dpts.length}`, x+w/2, fy+12, {size:10, col:'rgba(20,70,120,0.40)', align:'center'});
}

// ── Particles ─────────────────────────────────────────────────────────────────
function drawPtcl() {
  pts.forEach(p => {
    const a=p.t/p.mt;
    ctx.globalAlpha=a*0.85; ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*(0.4+a*0.6),0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function frame(ts) {
  const dt=Math.min((ts-lastTs)/1000, 0.05);
  lastTs=ts;
  update(dt);

  if      (S==='INTRO') drawIntro();
  else if (S==='DONE')  drawDone();
  else if (S==='WIN')   drawWin();
  else                  drawGame();   // PLAYING and RES both use drawGame

  requestAnimationFrame(frame);
}

requestAnimationFrame(ts => { lastTs=ts; requestAnimationFrame(frame); });
</script>
