<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fall Simulation</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Georgia, serif;
  background: #1a2e44;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
  gap: 10px;
}

#top-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

canvas {
  border-radius: 8px;
  border: 1px solid #2a4060;
  display: block;
  flex-shrink: 0;
}

/* ── control columns ── */
.ctrl {
  width: 90px;
  background: #131f2e;
  border-radius: 8px;
  padding: 10px 8px 8px;
  border: 1px solid #2a4060;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.ctrl-name {
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 6px;
  text-align: center;
}
.b1 .ctrl-name { color: #4a90f0; }
.b2 .ctrl-name { color: #e07030; }

.slider-group {
  display: flex;
  gap: 4px;
  justify-content: center;
  flex: 1;
  min-height: 0;
}
.slider-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  min-height: 0;
}
.slider-col .lbl {
  font-size: 10px;
  color: #7090a8;
  text-align: center;
  margin-bottom: 3px;
  line-height: 1.2;
}
.slider-col .num {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #c0d8f0;
  text-align: center;
  margin-top: 3px;
  white-space: nowrap;
}

.vslider {
  writing-mode: vertical-lr;
  direction: rtl;
  flex: 1;
  min-height: 0;
  width: 24px;
  cursor: pointer;
  margin: 0;
}
.b1 .vslider { accent-color: #4a90f0; }
.b2 .vslider { accent-color: #e07030; }

/* ── buttons row ── */
#btns {
  display: flex;
  gap: 12px;
  justify-content: center;
}
button {
  padding: 10px 40px;
  border: none;
  border-radius: 7px;
  font-family: Georgia, serif;
  font-size: 0.9em;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.15s;
}
#dropBtn { background: #1a68d8; color: #fff; }
#dropBtn:hover:not(:disabled) { background: #3a88f8; }
#dropBtn:disabled { background: #253545; color: #456; cursor: default; }
#resetBtn { background: #1a2e20; color: #60d890; border: 1px solid #2a5030; font-size: 0.82em; }
#resetBtn:hover { background: #203828; }
#zoomBtn { background: #2a1e40; color: #c090f8; border: 1px solid #4a3070; font-size: 0.82em; }
#zoomBtn:hover { background: #3a2858; }
#objBtn { background: #1a2e3e; color: #60c8d8; border: 1px solid #2a5060; font-size: 0.82em; }
#objBtn:hover { background: #1e3848; }
#objBtn.active { background: #253545; border-color: #4a8090; }

/* ── object panel ── */
#objectPanel {
  display: none;
  background: #131f2e;
  border: 1px solid #2a4060;
  border-radius: 8px;
  padding: 10px 16px 12px;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
#objectPanel.open { display: flex; }
#objPanelHeader { display: flex; gap: 10px; align-items: center; font-size: 12px; color: #7090a8; }
.obj-target {
  padding: 4px 14px; border-radius: 5px; border: 1px solid #2a4060;
  background: #1a2e44; font-size: 12px; font-weight: bold; cursor: pointer;
  transition: background 0.15s; letter-spacing: 0;
}
.obj-target.active { background: #253545; border-color: #4a6080; }
#objGrid { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.obj-choice {
  padding: 6px 13px; border-radius: 6px; border: 1px solid #2a4060;
  background: #1a2e44; color: #c0d8f0; font-size: 12px; cursor: pointer;
  letter-spacing: 0; transition: background 0.15s;
}
.obj-choice:hover { background: #253545; }
.obj-choice.selected { background: #1a4060; border-color: #4a90c0; color: #fff; }
</style>
</head>
<body>

<div id="top-row">
  <div class="ctrl b1">
    <div class="ctrl-name" id="ctrl-name-0">Bottle 1</div>
    <div class="slider-group">
      <div class="slider-col">
        <span class="lbl">Drop<br>height</span>
        <input class="vslider" type="range" id="h1" min="1" max="5" step="0.5" value="3">
        <span class="num" id="h1v">3.0 m</span>
      </div>
      <div class="slider-col" id="wc-0">
        <span class="lbl">Water<br>fill</span>
        <input class="vslider" type="range" id="w1" min="0" max="100" step="10" value="50">
        <span class="num" id="w1v">50%</span>
      </div>
    </div>
  </div>

  <canvas id="sim" width="680" height="520"></canvas>

  <div class="ctrl b2">
    <div class="ctrl-name" id="ctrl-name-1">Bottle 2</div>
    <div class="slider-group">
      <div class="slider-col">
        <span class="lbl">Drop<br>height</span>
        <input class="vslider" type="range" id="h2" min="1" max="5" step="0.5" value="3">
        <span class="num" id="h2v">3.0 m</span>
      </div>
      <div class="slider-col" id="wc-1">
        <span class="lbl">Water<br>fill</span>
        <input class="vslider" type="range" id="w2" min="0" max="100" step="10" value="80">
        <span class="num" id="w2v">80%</span>
      </div>
    </div>
  </div>
</div>

<div id="btns">
  <button id="dropBtn">Drop</button>
  <button id="resetBtn">Reset</button>
  <button id="zoomBtn">Zoom Out</button>
  <button id="objBtn">Objects</button>
</div>

<div id="objectPanel">
  <div id="objPanelHeader">
    <span>Replace:</span>
    <button class="obj-target active" data-idx="0" style="color:#4a90f0">Bottle 1</button>
    <button class="obj-target" data-idx="1" style="color:#e07030">Bottle 2</button>
  </div>
  <div id="objGrid">
    <button class="obj-choice selected" data-type="bottle">🍶 Bottle</button>
    <button class="obj-choice" data-type="baseball">⚾ Baseball</button>
    <button class="obj-choice" data-type="bowling">🎳 Bowling Ball</button>
    <button class="obj-choice" data-type="feather">🪶 Feather</button>
    <button class="obj-choice" data-type="brick">🧱 Brick</button>
  </div>
</div>

<script>
const cv = document.getElementById('sim');
const ctx = cv.getContext('2d');

/* ── layout constants ── */
const W = 680, H = 520, GY = 482;
const PPM_NORMAL = 72, PPM_ZOOM = 15;
let PPM = PPM_NORMAL;
let zoomed = false;
const BW0 = 40, BH0 = 46, NW0 = 18, NH0 = 14, CW0 = 22, CH0 = 7;
let BW = BW0, BH = BH0, NW = NW0, NH = NH0, CW = CW0, CH = CH0, TH = BH0 + NH0 + CH0;

function updateBottleScale() {
  const s = zoomed ? 0.45 : 1.0;
  BW = Math.round(BW0 * s);
  BH = Math.round(BH0 * s);
  NW = Math.round(NW0 * s);
  NH = Math.round(NH0 * s);
  CW = Math.round(CW0 * s);
  CH = Math.max(1, Math.round(CH0 * s));
  TH = BH + NH + CH;
}

/* ─────────────────────────────────────────────
   PHYSICS CONSTANTS
   ─────────────────────────────────────────────
   Drag model:  F_drag = ½ · ρ · C_d · A · v²

   ρ   = 1.225 kg/m³   (air density, sea level)
   C_d = 0.9            (blunt cylinder)
   d   = 0.06 m         (bottle diameter ≈ 6 cm)
   A   = π(d/2)²        (cross-sectional area)

   Bottle mass = empty shell + water fill:
     empty  ≈ 30 g   (typical PET bottle)
     water  ≈ 500 g  (at 100 % fill)
   ───────────────────────────────────────────── */
const g          = 9.8;
const RHO        = 1.225;
const C_D        = 0.9;
const DIAM       = 0.06;
const A          = Math.PI * (DIAM / 2) ** 2;
const DRAG_K     = 0.5 * RHO * C_D * A;

const MASS_EMPTY = 0.030;
const MASS_WATER = 0.500;

/* Fixed sub-step for Euler integrator (480 Hz).
   Frame-rate is ~60 fps → each frame is chopped
   into ~8 tiny physics steps for accuracy. */
const SIM_DT = 1 / 480;

/* Per-object physics: fixedMass (kg, null = use water-fill calc),
   dragK = ½·ρ·C_d·A for that object's shape/size. */
const OBJECT_TYPES = {
  bottle:   { name: 'Bottle',       fixedMass: null,   dragK: DRAG_K },
  baseball: { name: 'Baseball',     fixedMass: 0.145,  dragK: 0.5 * RHO * 0.47 * Math.PI * 0.037 ** 2 },
  bowling:  { name: 'Bowling Ball', fixedMass: 6.35,   dragK: 0.5 * RHO * 0.47 * Math.PI * 0.108 ** 2 },
  feather:  { name: 'Feather',      fixedMass: 0.008,  dragK: 0.5 * RHO * 1.40 * 0.006 },
  brick:    { name: 'Brick',        fixedMass: 2.0,    dragK: 0.5 * RHO * 1.05 * 0.014 },
};

const BOTTLES = [
  {cx: 220, h: 3, water: 50, color: '#4a90f0', cap: '#1a60c0', type: 'bottle',
   bottomY: 0, vy: 0, fallen: 0,
   landed: false, landTime: null, sparks: [], shattered: false},
  {cx: 460, h: 3, water: 80, color: '#e07030', cap: '#b04010', type: 'bottle',
   bottomY: 0, vy: 0, fallen: 0,
   landed: false, landTime: null, sparks: [], shattered: false}
];

let state = 'idle', t0 = null, elapsed = 0, raf = null, prevTs = null;

/* ── helpers ── */
function bottleMass(b) {
  const ot = OBJECT_TYPES[b.type];
  if (ot.fixedMass !== null) return ot.fixedMass;
  return MASS_EMPTY + (b.water / 100) * MASS_WATER;
}

function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function init() {
  for (const b of BOTTLES) {
    b.bottomY = GY - b.h * PPM;
    b.vy      = 0;
    b.fallen  = 0;
    b.landed  = false;
    b.landTime = null;
    b.sparks  = [];
    b.shattered = false;
  }
  elapsed = 0;
}

/* ── drawing ── */
function drawBg() {
  ctx.fillStyle = '#b8d8f0'; ctx.fillRect(0, 0, W, GY);
  ctx.strokeStyle = 'rgba(0,70,160,0.08)'; ctx.lineWidth = 1;
  const gridStep = zoomed ? 5 : 1;
  for (let m = gridStep; m <= 30; m += gridStep) {
    const y = GY - m * PPM; if (y < 0) break;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.fillStyle = '#6a481a'; ctx.fillRect(0, GY, W, H - GY);
  ctx.fillStyle = '#987028'; ctx.fillRect(0, GY, W, 3);
}

function drawRuler() {
  const tickStep = zoomed ? 5 : 1;
  const maxM     = zoomed ? 30 : 7;
  ctx.textAlign = 'right';
  for (let m = 0; m <= maxM; m += tickStep) {
    const y = GY - m * PPM; if (y < 0) break;
    ctx.strokeStyle = 'rgba(15,55,130,0.6)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(46, y); ctx.lineTo(57, y); ctx.stroke();
    ctx.fillStyle = 'rgba(10,45,110,0.75)'; ctx.font = '11px Georgia';
    ctx.fillText(m + 'm', 44, y + 4);
  }
  ctx.strokeStyle = 'rgba(15,55,130,0.22)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(57, GY); ctx.lineTo(57, GY - maxM * PPM); ctx.stroke();
}

/* ── shared draw helpers ── */
function drawShadow(b, baseR) {
  const dist = Math.max(0, GY - b.bottomY);
  const sp = 1 - Math.min(1, dist / Math.max(1, b.h * PPM));
  ctx.save(); ctx.globalAlpha = .05 + .2 * sp; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(b.cx, GY + 1, baseR * (.5 + .7 * sp), 3.5, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.restore();
}

function drawBadge(b, topY) {
  if (b.landTime === null) return;
  const badgeY = b.shattered ? GY - 20 : topY - 10;
  ctx.save(); ctx.fillStyle = 'rgba(255,250,220,0.95)'; ctx.strokeStyle = b.color; ctx.lineWidth = 1.5;
  rr(b.cx - 32, badgeY - 15, 64, 22, 5); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#3a2800'; ctx.font = 'bold 12px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(b.landTime.toFixed(2) + ' s', b.cx, badgeY); ctx.restore();
}

function drawIdleLine(b) {
  if (state !== 'idle') return;
  ctx.save(); ctx.setLineDash([7, 5]); ctx.strokeStyle = b.color + '50'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(64, b.bottomY); ctx.lineTo(W - 8, b.bottomY); ctx.stroke(); ctx.restore();
}

function objTopY(b) {
  const by = b.bottomY;
  switch (b.type) {
    case 'baseball': return by - Math.max(4, BW * 1.16);
    case 'bowling':  return by - Math.max(6, BW * 1.4);
    case 'feather':  return by - Math.max(8, BH * 1.8);
    case 'brick':    return by - Math.max(4, BH * 0.55);
    default:         return by - TH;
  }
}

/* ── per-object shape drawers ── */
function drawBottleShape(b) {
  const cx = b.cx, by = b.bottomY;
  const bT = by - BH, nT = bT - NH, cT = nT - CH;
  const wh = (b.water / 100) * (BH - 7);
  if (wh > 0) {
    ctx.save(); rr(cx - BW / 2 + 2, bT + 2, BW - 4, BH - 4, 5); ctx.clip();
    ctx.fillStyle = b.color + '99';
    ctx.fillRect(cx - BW / 2 + 2, by - 2 - wh, BW - 4, wh);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx - BW / 2 + 5, by - 2 - wh); ctx.lineTo(cx + BW / 2 - 5, by - 2 - wh); ctx.stroke();
    ctx.restore();
  }
  ctx.lineWidth = 2; ctx.strokeStyle = b.color; ctx.fillStyle = 'rgba(210,235,255,0.14)';
  rr(cx - BW / 2, bT, BW, BH, 7); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(210,235,255,0.12)'; ctx.strokeStyle = b.color; ctx.lineWidth = 1.5;
  ctx.fillRect(cx - NW / 2, nT, NW, NH); ctx.strokeRect(cx - NW / 2, nT, NW, NH);
  ctx.fillStyle = b.cap; rr(cx - CW / 2, cT, CW, CH, 3); ctx.fill();
  ctx.save(); rr(cx - BW / 2 + 1, bT + 1, BW - 2, BH - 2, 6); ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,0.2)'; rr(cx - BW / 2 + 4, bT + 6, 6, BH - 12, 3); ctx.fill(); ctx.restore();
}

function drawBaseballShape(b) {
  const cx = b.cx, by = b.bottomY;
  const r = Math.max(4, BW * 0.58);
  const cy = by - r;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#f5f0e8'; ctx.fill();
  ctx.strokeStyle = b.color; ctx.lineWidth = Math.max(0.5, 1.5 * BW / 40); ctx.stroke();
  ctx.strokeStyle = '#cc2200'; ctx.lineWidth = Math.max(0.5, BW * 0.045);
  ctx.beginPath(); ctx.arc(cx - r * 0.28, cy, r * 0.52, -0.7, 0.7); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx + r * 0.28, cy, r * 0.52, Math.PI - 0.7, Math.PI + 0.7); ctx.stroke();
  ctx.restore();
}

function drawBowlingShape(b) {
  const cx = b.cx, by = b.bottomY;
  const r = Math.max(5, BW * 0.7);
  const cy = by - r;
  ctx.save();
  const grd = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
  grd.addColorStop(0, '#5a5888'); grd.addColorStop(1, '#1a1830');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = grd; ctx.fill();
  ctx.strokeStyle = b.color; ctx.lineWidth = 1.5; ctx.stroke();
  const hr = Math.max(1, r * 0.15); ctx.fillStyle = 'rgba(0,0,0,0.75)';
  for (const [hx, hy] of [[cx - r*0.22, cy - r*0.18],[cx + r*0.18, cy - r*0.30],[cx + r*0.22, cy + r*0.12]]) {
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawFeatherShape(b) {
  const cx = b.cx, by = b.bottomY;
  const fw = Math.max(3, BW * 0.32);
  const fh = Math.max(8, BH * 1.8);
  ctx.save();
  ctx.fillStyle = 'rgba(240,238,215,0.88)';
  ctx.beginPath(); ctx.ellipse(cx, by - fh * 0.52, fw, fh * 0.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(200,188,140,0.5)'; ctx.lineWidth = 0.6; ctx.stroke();
  ctx.strokeStyle = '#c8b870'; ctx.lineWidth = Math.max(0.5, fw * 0.18);
  ctx.beginPath(); ctx.moveTo(cx, by); ctx.lineTo(cx, by - fh); ctx.stroke();
  ctx.restore();
}

function drawBrickShape(b) {
  const cx = b.cx, by = b.bottomY;
  const bw = Math.max(8, BW * 1.2);
  const bh = Math.max(4, BH * 0.55);
  const x = cx - bw / 2, y = by - bh;
  ctx.save();
  ctx.fillStyle = '#b04030'; rr(x, y, bw, bh, 2); ctx.fill();
  ctx.strokeStyle = '#7a2018'; ctx.lineWidth = 1; rr(x, y, bw, bh, 2); ctx.stroke();
  ctx.strokeStyle = '#d06050'; ctx.lineWidth = Math.max(0.5, bh * 0.1);
  ctx.beginPath(); ctx.moveTo(x + 2, y + bh * 0.5); ctx.lineTo(x + bw - 2, y + bh * 0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + bw * 0.1, y + 2); ctx.lineTo(cx + bw * 0.1, y + bh * 0.48); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - bw * 0.2, y + bh * 0.52); ctx.lineTo(cx - bw * 0.2, y + bh - 2); ctx.stroke();
  ctx.restore();
}

/* ── main object dispatcher (replaces drawBottle) ── */
function drawObject(b) {
  if (b.shattered) { drawBadge(b, 0); return; }

  const shadowR = b.type === 'bowling' ? Math.max(5, BW * 0.7)
                : b.type === 'feather' ? Math.max(3, BW * 0.32)
                : BW * 0.5;
  drawShadow(b, shadowR);

  switch (b.type) {
    case 'baseball': drawBaseballShape(b); break;
    case 'bowling':  drawBowlingShape(b);  break;
    case 'feather':  drawFeatherShape(b);  break;
    case 'brick':    drawBrickShape(b);    break;
    default:         drawBottleShape(b);   break;
  }

  if (b.landed) drawBadge(b, objTopY(b));
  drawIdleLine(b);
}

function drawSparks(b) {
  for (const p of b.sparks) {
    ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
    if (p.type === 'frag') {
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.strokeStyle = p.edge; ctx.lineWidth = 1;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.strokeRect(-p.w / 2, -p.h / 2, p.w, p.h);
    } else if (p.type === 'drop') {
      ctx.fillStyle = b.color + 'cc';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#a08060';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

function spawnSparks(b) {
  const isMax = b.type === 'bottle' && b.h === 30 && b.water === 100;
  if (isMax) {
    b.shattered = true;
    for (let i = 0; i < 10; i++) {
      const a = -Math.PI * (.04 + Math.random() * .92);
      const s = 100 + Math.random() * 280;
      b.sparks.push({type: 'frag', x: b.cx + (Math.random() - .5) * BW, y: GY - BH * .5,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        rot: Math.random() * Math.PI * 2, rotSpd: (Math.random() - .5) * 14,
        w: 4 + Math.random() * 14, h: 3 + Math.random() * 8,
        color: b.color, edge: b.cap, life: 1.1 + Math.random() * .4});
    }
    for (let i = 0; i < 28; i++) {
      const a = -Math.PI * (.06 + Math.random() * .88);
      const s = 80 + Math.random() * 320;
      b.sparks.push({type: 'drop', x: b.cx + (Math.random() - .5) * BW * .7, y: GY - 4,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s, r: 2 + Math.random() * 4, life: .7 + Math.random() * .6});
    }
  } else {
    const n = 4 + Math.round(b.h * .6);
    for (let i = 0; i < n; i++) {
      const a = -Math.PI * (.12 + Math.random() * .76);
      const s = 25 + Math.random() * 55;
      b.sparks.push({type: 'dust', x: b.cx + (Math.random() - .5) * BW * .9, y: GY - 2,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s, r: 1.5 + Math.random() * 2, life: .4 + Math.random() * .3});
    }
  }
}

function tickSparks(b, dt) {
  for (const p of b.sparks) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 920 * dt;
    if (p.type === 'frag') p.rot += p.rotSpd * dt;
    p.life -= dt * (p.type === 'dust' ? 3.5 : 2);
  }
  b.sparks = b.sparks.filter(p => p.life > 0 && p.y < GY + 30);
}

function draw() {
  ctx.clearRect(0, 0, W, H); drawBg(); drawRuler();
  BOTTLES.forEach((b, i) => { drawObject(b); drawSparks(b); });
}

/* ── single Euler sub-step ── */
function physicsStep(b, dt) {
  const m    = bottleMass(b);
  const drag = OBJECT_TYPES[b.type].dragK * b.vy * b.vy;
  const a    = g - drag / m;
  b.vy    += a * dt;
  b.fallen += b.vy * dt;
}

/* ── animation loop ── */
function animate(ts) {
  if (!t0) t0 = ts;
  elapsed = (ts - t0) / 1000;
  const frameDt = prevTs ? Math.min(.05, (ts - prevTs) / 1000) : 1 / 60;
  prevTs = ts;

  let allLanded = true;
  for (const b of BOTTLES) {
    if (!b.landed) {
      allLanded = false;

      /* Chop frame interval into fixed sub-steps
         so the Euler integrator stays accurate. */
      let remaining = frameDt;
      while (remaining > 0) {
        const step = Math.min(remaining, SIM_DT);
        physicsStep(b, step);
        remaining -= step;
      }

      const ny = GY - (b.h - b.fallen) * PPM;
      if (ny >= GY) {
        b.bottomY  = GY;
        b.landed   = true;
        b.landTime = elapsed;
        spawnSparks(b);
      } else {
        b.bottomY = ny;
      }
    }
    tickSparks(b, frameDt);
  }

  draw();

  if (allLanded && state === 'falling') {
    state = 'done';
    document.getElementById('dropBtn').disabled = false;
  }
  if (!allLanded || BOTTLES.some(b => b.sparks.length > 0)) {
    raf = requestAnimationFrame(animate);
  }
}

/* ── slider wiring ── */
function wire(sid, did, prop, idx, fmt) {
  document.getElementById(sid).addEventListener('input', function () {
    const v = parseFloat(this.value);
    BOTTLES[idx][prop] = v;
    document.getElementById(did).textContent = fmt(v);
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    state = 'idle';
    document.getElementById('dropBtn').disabled = false;
    init(); draw();
  });
}
wire('h1', 'h1v', 'h',     0, v => v.toFixed(1) + ' m');
wire('w1', 'w1v', 'water',  0, v => v + '%');
wire('h2', 'h2v', 'h',      1, v => v.toFixed(1) + ' m');
wire('w2', 'w2v', 'water',  1, v => v + '%');

document.getElementById('dropBtn').addEventListener('click', () => {
  if (state === 'falling') return;
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  state = 'falling'; t0 = null; prevTs = null;
  document.getElementById('dropBtn').disabled = true;
  init(); raf = requestAnimationFrame(animate);
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  state = 'idle'; document.getElementById('dropBtn').disabled = false;
  init(); draw();
});

document.getElementById('zoomBtn').addEventListener('click', () => {
  zoomed = !zoomed;
  PPM = zoomed ? PPM_ZOOM : PPM_NORMAL;
  const maxH = zoomed ? 30 : 5;
  const step = zoomed ? 1 : 0.5;
  document.getElementById('zoomBtn').textContent = zoomed ? 'Zoom In' : 'Zoom Out';

  [['h1', 'h1v', 0], ['h2', 'h2v', 1]].forEach(([sid, did, idx]) => {
    const sl = document.getElementById(sid);
    sl.max  = maxH;
    sl.step = step;
    const clamped = Math.min(parseFloat(sl.value), maxH);
    sl.value = clamped;
    BOTTLES[idx].h = clamped;
    document.getElementById(did).textContent = clamped.toFixed(1) + ' m';
  });

  updateBottleScale();
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  state = 'idle';
  document.getElementById('dropBtn').disabled = false;
  init(); draw();
});

/* ── object panel logic ── */
let objPanelTarget = 0;

function updateWaterSlider(idx) {
  document.getElementById('wc-' + idx).style.display =
    BOTTLES[idx].type === 'bottle' ? '' : 'none';
}

function syncObjPanel() {
  document.querySelectorAll('.obj-target').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.idx) === objPanelTarget);
  });
  const cur = BOTTLES[objPanelTarget].type;
  document.querySelectorAll('.obj-choice').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.type === cur);
  });
}

document.getElementById('objBtn').addEventListener('click', () => {
  const panel = document.getElementById('objectPanel');
  panel.classList.toggle('open');
  document.getElementById('objBtn').classList.toggle('active', panel.classList.contains('open'));
  syncObjPanel();
});

document.querySelectorAll('.obj-target').forEach(btn => {
  btn.addEventListener('click', () => {
    objPanelTarget = parseInt(btn.dataset.idx);
    syncObjPanel();
  });
});

document.querySelectorAll('.obj-choice').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.type;
    BOTTLES[objPanelTarget].type = type;
    const info = OBJECT_TYPES[type];
    document.getElementById('ctrl-name-' + objPanelTarget).textContent = info.name;
    updateWaterSlider(objPanelTarget);
    syncObjPanel();
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    state = 'idle';
    document.getElementById('dropBtn').disabled = false;
    init(); draw();
  });
});

updateBottleScale(); init(); draw();
</script>
</body>
